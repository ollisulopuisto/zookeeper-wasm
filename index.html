<!DOCTYPE html>
<html lang="en">
<head>

    <title>Zookeeper WASM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
    <style>
        html, body {
            margin: 0;

            height: 100%;

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            outline: none;

        load("zookeeper_wasm.wasm");
    </script>
