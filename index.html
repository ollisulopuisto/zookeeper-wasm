<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>WASM Games Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: sans-serif;
            background: #111;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 { color: #fff; }
        ul { list-style: none; padding: 0; }
        li { margin: 1rem 0; }
        a {
            color: #4af;
            text-decoration: none;
            font-size: 1.5rem;
            border: 1px solid #4af;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            transition: background 0.2s;
        }
        a:hover {
            background: #4af;
            color: #111;
        }
    </style>
</head>
<body>
    <h1>🕹️ WASM Games Portal</h1>
    <ul>
        <li><a href="zookeeper/">Zookeeper Clone</a></li>
    </ul>
</body>
</html>
