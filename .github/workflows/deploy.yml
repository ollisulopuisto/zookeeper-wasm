name: Rust WASM CI/CD

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      changed_games: ${{ steps.detect_changes.outputs.changed_games }}
      shared_changed: ${{ steps.detect_changes.outputs.shared_changed }}
      rebuild_all: ${{ steps.detect_changes.outputs.rebuild_all }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Detect changed paths
        id: detect_changes
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            BASE="${{ github.event.before }}"
          else
            BASE="$(git rev-list --max-parents=0 HEAD | tail -n1)"
          fi
          CHANGED_FILES="$(git diff --name-only "$BASE" "${{ github.sha }}" || true)"
          echo "Changed files:"
          echo "$CHANGED_FILES"

          SHARED_CHANGED=false
          if echo "$CHANGED_FILES" | grep -Eq '^(Cargo\.toml|Cargo\.lock|games_repo/Cargo\.toml|games_repo/Cargo\.lock|games_repo/Makefile|games_repo/index\.template\.html|games_repo/scripts/|games_repo/assets/|\.github/workflows/deploy\.yml)'; then
            SHARED_CHANGED=true
          fi

          CHANGED_GAMES=""
          for game in zookeeper bubbles lumines gravitris; do
            if echo "$CHANGED_FILES" | grep -q "^games_repo/games/$game/"; then
              CHANGED_GAMES="$CHANGED_GAMES $game"
            fi
          done
          CHANGED_GAMES="$(echo "$CHANGED_GAMES" | xargs || true)"

          REBUILD_ALL=false
          if [ "$SHARED_CHANGED" = true ] || [ -z "$CHANGED_GAMES" ]; then
            REBUILD_ALL=true
          fi

          echo "shared_changed=$SHARED_CHANGED" >> "$GITHUB_OUTPUT"
          echo "changed_games=$CHANGED_GAMES" >> "$GITHUB_OUTPUT"
          echo "rebuild_all=$REBUILD_ALL" >> "$GITHUB_OUTPUT"

      - name: Cache zookeeper dist
        uses: actions/cache@v4
        with:
          path: games_repo/games/zookeeper/dist
          key: zookeeper-dist-${{ hashFiles('games_repo/games/zookeeper/**', 'games_repo/scripts/**', 'games_repo/assets/**', 'games_repo/Cargo.toml', 'games_repo/Cargo.lock', 'Cargo.toml', 'Cargo.lock') }}

      - name: Cache bubbles dist
        uses: actions/cache@v4
        with:
          path: games_repo/games/bubbles/dist
          key: bubbles-dist-${{ hashFiles('games_repo/games/bubbles/**', 'games_repo/scripts/**', 'games_repo/assets/**', 'games_repo/Cargo.toml', 'games_repo/Cargo.lock', 'Cargo.toml', 'Cargo.lock') }}

      - name: Cache lumines dist
        uses: actions/cache@v4
        with:
          path: games_repo/games/lumines/dist
          key: lumines-dist-${{ hashFiles('games_repo/games/lumines/**', 'games_repo/scripts/**', 'games_repo/assets/**', 'games_repo/Cargo.toml', 'games_repo/Cargo.lock', 'Cargo.toml', 'Cargo.lock') }}

      - name: Cache gravitris dist
        uses: actions/cache@v4
        with:
          path: games_repo/games/gravitris/dist
          key: gravitris-dist-${{ hashFiles('games_repo/games/gravitris/**', 'games_repo/scripts/**', 'games_repo/assets/**', 'games_repo/Cargo.toml', 'games_repo/Cargo.lock', 'Cargo.toml', 'Cargo.lock') }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxi-dev libgl1-mesa-dev libxcursor-dev libxinerama-dev libxrandr-dev lld

      - name: Run Tests
        run: cargo test --workspace --all-targets --all-features

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get install -y binaryen

      - name: Build WASM Games
        run: |
          if [ "${{ steps.detect_changes.outputs.rebuild_all }}" = "true" ]; then
            BUILD_GAMES=""
          else
            BUILD_GAMES="${{ steps.detect_changes.outputs.changed_games }}"
          fi
          cd games_repo && make build BUILD_GAMES="$BUILD_GAMES"
          # Post-process all wasm files with wasm-opt -O3
          find docs -name "*.wasm" -exec wasm-opt -O3 {} -o {} \;
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'games_repo/docs'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
