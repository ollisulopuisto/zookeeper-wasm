<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Jetpac WASM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body, canvas {
            margin: 0px;
            padding: 0px;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
            z-index: 0;
            touch-action: none;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            font-family: monospace;
            cursor: pointer;
        }
        h1 { margin-bottom: 20px; }
        .hint { margin-top: 20px; color: #aaa; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>JETPAC</h1>
        <p>TAP TO START</p>
        <p class="hint">(Ensure mute switch is OFF on iOS)</p>
    </div>
    <audio id="silent-audio" preload="auto">
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAAAA" type="audio/wav">
    </audio>
    <canvas id="glcanvas"></canvas>
    <script src="mq_js_bundle.js"></script>
    <script>
        const overlay = document.getElementById('overlay');
        const silentAudio = document.getElementById('silent-audio');
        
        // This function will be called when the user interacts with the page
        async function startAudio() {
            // 1. Play the silent audio tag to "hijack" the audio session (ignores mute switch on some iOS versions)
            try {
                silentAudio.play().catch(() => {});
            } catch(e) {}

            // 2. Standard Macroquad/Miniquad audio context might be hidden in the bundle
            // but we can proactively resume any suspended contexts.
            if (window.AudioContext || window.webkitAudioContext) {
                const Context = window.AudioContext || window.webkitAudioContext;
                const tempCtx = new Context();
                if (tempCtx.state === 'suspended') {
                    await tempCtx.resume();
                }
                // 3. We also play a tiny silent buffer to "prime" the audio engine
                const buffer = tempCtx.createBuffer(1, 1, 22050);
                const source = tempCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(tempCtx.destination);
                source.start(0);
            }
        }

        overlay.addEventListener('click', async () => {
            await startAudio();
            overlay.style.display = 'none';
            load("jetpac_wasm.wasm");
        }, { once: true });

        overlay.addEventListener('touchend', async () => {
            await startAudio();
            overlay.style.display = 'none';
            load("jetpac_wasm.wasm");
        }, { once: true });
    </script>
</body>
</html>
