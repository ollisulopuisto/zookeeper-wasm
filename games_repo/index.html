<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>WASM Games Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }
        h1 { margin-bottom: 3rem; font-size: 2.5rem; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1000px;
        }
        .card {
            background: #2a2a2a;
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            border: 1px solid #333;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            background: #333;
            border-color: #4af;
        }
        .card img {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
        }
        .card span {
            font-size: 1.25rem;
            font-weight: bold;
            color: #4af;
        }
    </style>
</head>
<body>
    <h1>🕹️ WASM GAMES</h1>
    <div class="grid">
        <a href="zookeeper/" class="card">
            <img src="assets/icon.png" alt="Zookeeper">
            <span>Zookeeper</span>
        </a>
        <a href="jetpac_wasm/" class="card">
            <img src="../assets/1f981.png" alt="Jetpac">
            <span>Jetpac</span>
        </a>
    </div>
    <div style="margin-top: 4rem; color: #666; font-size: 0.8rem;">
        v26.3.3.27
    </div>
</body>
</html>
