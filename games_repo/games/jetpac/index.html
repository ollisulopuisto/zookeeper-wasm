<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Jetpac WASM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
        }
        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            outline: none;
            z-index: 5;
            cursor: pointer;
        }
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
            text-align: center;
        }
        #start-button {
            margin-top: 2rem;
            padding: 1.5rem 3rem;
            font-size: 2rem;
            font-weight: bold;
            color: #000;
            background: #ff0;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 255, 0, 0.4);
        }
        .hint { margin-top: 20px; color: #aaa; font-size: 0.8rem; }
    </style>
</head>
<body>
    <audio id="silent-audio" preload="auto">
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAAAA" type="audio/wav">
    </audio>
    <canvas id="glcanvas" tabindex='1'></canvas>
    <div id="start-overlay">
        <h1>JETPAC</h1>
        <p>Mobile & Desktop Supported</p>
        <button id="start-button" onclick="startGame()">START GAME</button>
        <p class="hint">(Ensure mute switch is OFF on iOS for audio)</p>
    </div>
    
    <script src="mq_js_bundle.js"></script>
    <script>
        let started = false;
        const canvas = document.getElementById('glcanvas');
        
        function startGame() {
            if (started) return;
            started = true;
            console.log("Starting JETPAC...");

            // Resume AudioContext
            const Context = window.AudioContext || window.webkitAudioContext;
            if (Context) {
                const ctx = new Context();
                ctx.resume();
            }

            // Silent audio prime
            const silentAudio = document.getElementById('silent-audio');
            if (silentAudio) {
                silentAudio.play().catch(() => {});
            }

            document.getElementById('start-overlay').style.display = 'none';
            
            // Focus canvas for keyboard input
            canvas.focus();

            // Standard Macroquad load
            load("jetpac.wasm");
        }

        // Add touchstart for faster response on mobile
        document.getElementById('start-button').addEventListener('touchstart', (e) => {
            e.preventDefault();
            startGame();
        });

        canvas.addEventListener('mousedown', () => {
            canvas.focus();
        });
    </script>
</body>
</html>
