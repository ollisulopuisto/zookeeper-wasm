<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Zookeeper</title>
    <meta name="description" content="A fast-paced match-3 game written in Rust/WASM. Clear the board and beat the high score!">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
    
    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Zookeeper">
    <meta property="og:description" content="A fast-paced match-3 game written in Rust/WASM. Clear the board and beat the high score!">
    <meta property="og:image" content="../../assets/icon.png">

    <!-- Twitter / Bluesky -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Zookeeper">
    <meta name="twitter:description" content="A fast-paced match-3 game written in Rust/WASM. Clear the board and beat the high score!">
    <meta name="twitter:image" content="../../assets/icon.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #111;
            overflow: hidden;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            outline: none;
            z-index: 5;
        }
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #start-button {
            padding: 1.5rem 3rem;
            font-size: 2rem;
            font-weight: bold;
            color: #111;
            background: #4af;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(74, 170, 255, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="glcanvas" tabindex='1'></canvas>
    <div id="start-overlay">
        <button id="start-button" onclick="startGame()">START GAME</button>
    </div>
    
    <script src="mq_js_bundle.js"></script>
    <script>
        // Capture AudioContext to resume it on iOS Safari
        let captured_ctx = null;
        (function() {
            const OriginalAudioContext = window.AudioContext || window.webkitAudioContext;
            if (OriginalAudioContext) {
                const NewAudioContext = function() {
                    const ctx = new OriginalAudioContext();
                    captured_ctx = ctx;
                    return ctx;
                };
                NewAudioContext.prototype = OriginalAudioContext.prototype;
                if (window.AudioContext) window.AudioContext = NewAudioContext;
                if (window.webkitAudioContext) window.webkitAudioContext = NewAudioContext;
            }
        })();

        // Self-contained Bridge for Rust
        miniquad_add_plugin({
            register_plugin: function (importObject) {
                importObject.env.js_load_leaderboard = function (ptr, max_len) {
                    const data = localStorage.getItem("WASM_GAMES_LEADERBOARD_ZOOKEEPER") || "[]";
                    const bytes = new TextEncoder().encode(data);
                    const len = Math.min(bytes.length, max_len);
                    const heap = new Uint8Array(importObject.env.memory.buffer);
                    heap.set(bytes.subarray(0, len), ptr);
                    return len;
                };
                importObject.env.js_save_leaderboard = function (ptr, len) {
                    const heap = new Uint8Array(importObject.env.memory.buffer);
                    const data = new TextDecoder().decode(heap.subarray(ptr, ptr + len));
                    localStorage.setItem("WASM_GAMES_LEADERBOARD_ZOOKEEPER", data);
                };
            }
        });

        window.ask_name = function() {
            return prompt("Enter your initials:", "") || "ANON";
        };

        let started = false;
        function resumeAudio() {
            if (captured_ctx && captured_ctx.state === 'suspended') {
                captured_ctx.resume().then(() => {
                    console.log("AudioContext resumed successfully");
                });
            }
        }

        function startGame() {
            if (started) return;
            started = true;
            console.log("Initializing Game...");

            // Try to resume on first click
            resumeAudio();

            document.getElementById('start-overlay').style.display = 'none';
            
            // Focus canvas for keyboard input
            const canvas = document.getElementById('glcanvas');
            if (canvas) canvas.focus();

            // Standard Macroquad load
            load("zookeeper_wasm.wasm");
        }

        // Add listeners for any subsequent interaction to ensure audio is unlocked
        window.addEventListener('click', resumeAudio, true);
        window.addEventListener('touchstart', resumeAudio, true);
        window.addEventListener('touchend', resumeAudio, true);
    </script>
</body>
</html>
