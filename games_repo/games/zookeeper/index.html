<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Zookeeper WASM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #111;
            overflow: hidden;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            outline: none;
            z-index: 5;
        }
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #start-button {
            padding: 1.5rem 3rem;
            font-size: 2rem;
            font-weight: bold;
            color: #111;
            background: #4af;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(74, 170, 255, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="glcanvas" tabindex='1'></canvas>
    <div id="start-overlay">
        <button id="start-button" onclick="startGame()">START GAME</button>
    </div>
    
    <script src="mq_js_bundle.js"></script>
    <script>
        // Centralized Leaderboard System
        window.get_leaderboard = function(gameId) {
            try {
                const data = localStorage.getItem("WASM_GAMES_LEADERBOARD");
                const leaderboard = data ? JSON.parse(data) : {};
                return JSON.stringify(leaderboard[gameId] || []);
            } catch (e) { return "[]"; }
        };

        window.save_score = function(gameId, name, score) {
            try {
                const data = localStorage.getItem("WASM_GAMES_LEADERBOARD");
                const leaderboard = data ? JSON.parse(data) : {};
                if (!leaderboard[gameId]) leaderboard[gameId] = [];
                leaderboard[gameId].push({ name, score });
                leaderboard[gameId].sort((a, b) => b.score - a.score);
                leaderboard[gameId] = leaderboard[gameId].slice(0, 5);
                localStorage.setItem("WASM_GAMES_LEADERBOARD", JSON.stringify(leaderboard));
            } catch (e) { console.error(e); }
        };

        window.ask_name = function() {
            return prompt("Enter your initials:", "") || "ANON";
        };

        let started = false;
        function startGame() {
            if (started) return;
            started = true;
            console.log("Initializing Game...");

            // Resume AudioContext
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                const ctx = new AudioContext();
                ctx.resume();
            }

            document.getElementById('start-overlay').style.display = 'none';
            
            // Standard Macroquad load
            load("zookeeper_wasm.wasm");
        }
    </script>
</body>
</html>
