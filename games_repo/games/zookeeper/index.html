<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Zookeeper</title>
    <meta name="description" content="A fast-paced match-3 game written in Rust/WASM. Clear the board and beat the high score!">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
    
    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Zookeeper">
    <meta property="og:description" content="A fast-paced match-3 game written in Rust/WASM. Clear the board and beat the high score!">
    <meta property="og:image" content="../../assets/icon.png">

    <!-- Twitter / Bluesky -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Zookeeper">
    <meta name="twitter:description" content="A fast-paced match-3 game written in Rust/WASM. Clear the board and beat the high score!">
    <meta name="twitter:image" content="../../assets/icon.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #111;
            overflow: hidden;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            outline: none;
            z-index: 5;
        }
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #start-button {
            padding: 1.5rem 3rem;
            font-size: 2rem;
            font-weight: bold;
            color: #111;
            background: #4af;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(74, 170, 255, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="glcanvas" tabindex='1'></canvas>
    <div id="start-overlay">
        <button id="start-button" onclick="startGame()">START GAME</button>
    </div>
    
    <script src="mq_js_bundle.js"></script>
    <script>
        // Centralized Leaderboard System
        window.get_leaderboard_js = function(gameId) {
            try {
                const data = localStorage.getItem("WASM_GAMES_LEADERBOARD");
                const leaderboard = data ? JSON.parse(data) : {};
                return JSON.stringify(leaderboard[gameId] || []);
            } catch (e) { return "[]"; }
        };

        window.save_score_js = function(gameId, name, score, combo) {
            try {
                const data = localStorage.getItem("WASM_GAMES_LEADERBOARD");
                const leaderboard = data ? JSON.parse(data) : {};
                if (!leaderboard[gameId]) leaderboard[gameId] = [];
                leaderboard[gameId].push({ name, score, combo: combo || 0 });
                leaderboard[gameId].sort((a, b) => b.score - a.score);
                leaderboard[gameId] = leaderboard[gameId].slice(0, 5);
                localStorage.setItem("WASM_GAMES_LEADERBOARD", JSON.stringify(leaderboard));
            } catch (e) { console.error(e); }
        };

        // Bridge for Rust
        miniquad_add_plugin({
            register_plugin: function (importObject) {
                importObject.env.get_leaderboard_js = function (game_id_ptr) {
                    const game_id = js_objects.get(game_id_ptr);
                    return js_objects.add(window.get_leaderboard_js(game_id));
                };
                importObject.env.save_score_js = function (game_id_ptr, name_ptr, score, combo) {
                    const game_id = js_objects.get(game_id_ptr);
                    const name = js_objects.get(name_ptr);
                    window.save_score_js(game_id, name, score, combo);
                };
            }
        });

        window.ask_name = function() {
            return prompt("Enter your initials:", "") || "ANON";
        };

        let started = false;
        function startGame() {
            if (started) return;
            started = true;
            console.log("Initializing Game...");

            // Resume AudioContext
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                const ctx = new AudioContext();
                ctx.resume();
            }

            document.getElementById('start-overlay').style.display = 'none';
            
            // Focus canvas for keyboard input
            canvas.focus();

            // Standard Macroquad load
            load("zookeeper_wasm.wasm");
        }
    </script>
</body>
</html>
