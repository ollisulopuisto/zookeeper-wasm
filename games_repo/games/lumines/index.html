<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Lumines WASM</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            outline: none;
        }
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #start-button {
            padding: 1.5rem 3rem;
            font-size: 2rem;
            font-weight: bold;
            color: #000;
            background: #f80;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 136, 0, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="glcanvas" tabindex='1'></canvas>
    
    <div id="start-overlay">
        <button id="start-button" onclick="startGame()">START GAME</button>
    </div>

    <script src="../../scripts/audio_unlock.js"></script>
    <script src="mq_js_bundle.js"></script>
    <script>
        // High Score Bridge (centralized)
        miniquad_add_plugin({
            register_plugin: function (importObject) {
                importObject.env.js_load_leaderboard = function(ptr, max_len) {
                    const data = localStorage.getItem('lumines_high_scores') || "[]";
                    const bytes = new TextEncoder().encode(data);
                    const len = Math.min(bytes.length, max_len);
                    const memory = new Uint8Array((importObject.env.memory || wasm_memory).buffer);
                    memory.set(bytes.slice(0, len), ptr);
                    return len;
                };

                importObject.env.js_save_leaderboard = function(ptr, len) {
                    const memory = new Uint8Array((importObject.env.memory || wasm_memory).buffer);
                    const data = new TextDecoder().decode(memory.slice(ptr, ptr + len));
                    localStorage.setItem('lumines_high_scores', data);
                };

                importObject.env.js_ask_name = function(ptr, max_len) {
                    const name = prompt("New High Score! Enter your name:", "") || "ANON";
                    const bytes = new TextEncoder().encode(name.substring(0, 10));
                    const len = Math.min(bytes.length, max_len);
                    const memory = new Uint8Array((importObject.env.memory || wasm_memory).buffer);
                    memory.set(bytes.slice(0, len), ptr);
                    return len;
                };

                importObject.env.js_get_user_agent_ptr = function(ptr, max_len) {
                    const ua = navigator.userAgent;
                    const bytes = new TextEncoder().encode(ua);
                    const len = Math.min(bytes.length, max_len);
                    const memory = new Uint8Array((importObject.env.memory || wasm_memory).buffer);
                    memory.set(bytes.slice(0, len), ptr);
                    return len;
                };
            }
        });

        let started = false;
        function startGame() {
            if (started) return;
            started = true;
            
            // Resume AudioContext (shared script)
            if (window.resumeAudio) window.resumeAudio();

            document.getElementById('start-overlay').style.display = 'none';
            const canvas = document.getElementById('glcanvas');
            if (canvas) canvas.focus();

            load("lumines_wasm.wasm");
        }

        // Auto-start on non-mobile if desired, but iOS needs the button
        // For simplicity and consistency with Zookeeper, we always show the button
    </script>
</body>
</html>
