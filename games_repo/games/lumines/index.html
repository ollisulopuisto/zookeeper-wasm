<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Lumines WASM</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <canvas id="glcanvas"></canvas>
    <script src="https://not-flappy-bird.netlify.app/mq_js_bundle.js"></script>
    <script>
        // High Score Bridge (similar to Zookeeper)
        window.js_load_leaderboard = function(ptr, max_len) {
            const data = localStorage.getItem('lumines_high_scores') || "[]";
            const bytes = new TextEncoder().encode(data);
            const len = Math.min(bytes.length, max_len);
            const memory = new Uint8Array(wasm_exports.memory.buffer);
            memory.set(bytes.slice(0, len), ptr);
            return len;
        };

        window.js_save_leaderboard = function(ptr, len) {
            const memory = new Uint8Array(wasm_exports.memory.buffer);
            const data = new TextDecoder().decode(memory.slice(ptr, ptr + len));
            localStorage.setItem('lumines_high_scores', data);
        };

        window.js_ask_name = function(ptr, max_len) {
            const name = prompt("New High Score! Enter your name:", "") || "ANON";
            const bytes = new TextEncoder().encode(name.substring(0, 10));
            const len = Math.min(bytes.length, max_len);
            const memory = new Uint8Array(wasm_exports.memory.buffer);
            memory.set(bytes.slice(0, len), ptr);
            return len;
        };

        load("lumines_wasm.wasm");
    </script>
</body>
</html>
