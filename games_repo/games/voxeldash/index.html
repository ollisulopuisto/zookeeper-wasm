<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VoxelDash: The Great Carving</title>
    <style>
        body { margin: 0; background: #050505; color: white; overflow: hidden; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        #container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #ui { position: absolute; top: 20px; left: 20px; text-shadow: 2px 2px #000; pointer-events: none; }
        #controls { position: absolute; bottom: 20px; left: 20px; color: #666; font-size: 0.8rem; pointer-events: none; }
        svg { width: 100vw; height: 100vh; }
        .win { font-size: 4rem; color: #ff0; text-align: center; }
        button { background: #ff0; border: none; padding: 1rem 2rem; font-family: inherit; font-weight: bold; cursor: pointer; pointer-events: auto; }
        .mode { font-weight: bold; }
        .lift { color: #0ff; }
        .carve { color: #f0f; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="status">VOXEL VOID | MODE: <span id="mode-text">IDLE</span></div>
    </div>
    <div id="container"></div>
    <div id="controls">
        WASD: Move | SPACE: Jump | <b>SHIFT: LIFT</b> | <b>E: CARVE VOID</b> | DRAG: Rotate
    </div>

    <script type="module">
        import { Heerich } from 'https://esm.sh/heerich';
        import init, { Game } from './pkg/voxeldash.js';

        async function start() {
            await init();
            const game = new Game();
            
            const container = document.getElementById('container');
            const modeText = document.getElementById('mode-text');
            const keys = new Set();
            
            let camYaw = 315; // Starting at 315 should show TOP view
            let camY = 20; 
            let camDist = 40;
            
            window.addEventListener('keydown', (e) => keys.add(e.keyCode));
            window.addEventListener('keyup', (e) => keys.delete(e.keyCode));

            window.addEventListener('mousemove', (e) => {
                if (e.buttons === 1) {
                    camYaw = (camYaw + e.movementX * 0.5) % 360;
                    camY = Math.max(-60, Math.min(60, camY + e.movementY * 0.2));
                }
            });

            window.addEventListener('wheel', (e) => {
                camDist = Math.max(10, Math.min(100, camDist + e.deltaY * 0.1));
            }, { passive: false });

            let lastTime = performance.now();
            
            function loop(currentTime) {
                const dt = Math.min((currentTime - lastTime) / 1000, 0.1);
                lastTime = currentTime;
                
                // Rust returns scene with field names: camera_yaw, camera_y, camera_distance, etc.
                const scene = game.tick(dt, new Uint8Array(Array.from(keys)), camYaw, camY, camDist);
                
                if (scene) {
                    if (scene.won) {
                        container.innerHTML = "<div class='win'><h1>GOAL SECURED</h1><button onclick='location.reload()'>RESTART</button></div>";
                        return;
                    }

                    if (scene.is_lifting) { modeText.innerText = "RESONANT LIFT"; modeText.className = "mode lift"; }
                    else if (scene.is_carving) { modeText.innerText = "VOID CARVING"; modeText.className = "mode carve"; }
                    else { modeText.innerText = "IDLE"; modeText.className = "mode"; }
                    
                    const heerich = new Heerich({
                        tile: [30 * (40 / scene.camera_distance), 30 * (40 / scene.camera_distance)],
                        camera: { 
                            type: 'oblique', 
                            angle: scene.camera_yaw, 
                            camY: 0,
                            distance: 25,
                            offset: [-scene.player_pos[0], scene.player_pos[1] - 1, -scene.player_pos[2]]
                        }
                    });

                    const borderW = 0.15;

                    heerich.addWhere({
                        bounds: [[-15, -10, -15], [16, 6, 16]], 
                        test: (x, y, z) => {
                            const ix = x + 15;
                            const iz = z + 15;
                            if (ix < 0 || ix >= 31 || iz < 0 || iz >= 31) return false;
                            const height = scene.height_map[ix * 31 + iz];
                            return -y <= height; 
                        },
                        scale: (x, y, z) => {
                            const dist = Math.sqrt((x - scene.player_pos[0])**2 + (z - scene.player_pos[2])**2);
                            if (scene.is_lifting && dist < 2.5) return [1, 1.8, 1];
                            if (scene.is_carving && dist < 2.5) return [Math.max(0.1, 1.0 - (2.5 - dist) * 0.4), 1, Math.max(0.1, 1.0 - (2.5 - dist) * 0.4)];
                            return null;
                        },
                        scaleOrigin: [0.5, 1, 0.5],
                        style: {
                            default: (x, y, z) => {
                                const dist = Math.sqrt((x - scene.player_pos[0])**2 + (z - scene.player_pos[2])**2);
                                if (scene.is_lifting && dist < 2.5) return { fill: '#0ff', stroke: '#fff', opacity: 0.8, strokeWidth: borderW };
                                if (scene.is_carving && dist < 2.5) return { fill: '#f0f', stroke: '#ff00ff', opacity: 0.7, strokeDasharray: '2 2', strokeWidth: borderW };
                                
                                let color;
                                const ry = -y;
                                if (ry < -1) color = "#5d4037"; 
                                else if (ry < 2) color = "#4caf50"; 
                                else color = "#2196f3"; 
                                return { fill: color, stroke: '#000', strokeWidth: borderW };
                            }
                        }
                    });

                    if (scene.is_carving) {
                        heerich.addBox({
                            position: [Math.round(scene.player_pos[0]) - 2, -Math.round(scene.player_pos[1]) - 3, Math.round(scene.player_pos[2]) - 2],
                            size: [5, 5, 5],
                            opaque: false,
                            style: { default: { fill: 'none', stroke: '#f0f', strokeWidth: borderW, opacity: 0.5 } }
                        });
                    }

                    heerich.addBox({
                        position: [scene.goal_pos[0], -scene.goal_pos[1], scene.goal_pos[2]],
                        size: [2, 2, 2],
                        style: { default: { fill: '#ff0', stroke: '#000', strokeWidth: borderW, opacity: 0.9 } }
                    });

                    const px = Math.round(scene.player_pos[0]);
                    const py = -Math.round(scene.player_pos[1]);
                    const pz = Math.round(scene.player_pos[2]);
                    const playerStyle = { default: { fill: scene.is_lifting ? '#fff' : (scene.is_carving ? '#f0f' : '#f00'), stroke: '#000', strokeWidth: borderW } };

                    heerich.addBox({ position: [px, py, pz], size: [1, 1, 1], style: playerStyle });
                    heerich.addBox({ position: [px, py - 2, pz], size: [1, 2, 1], style: playerStyle });
                    heerich.addBox({ position: [px, py - 3, pz], size: [1, 1, 1], style: playerStyle });
                    heerich.addBox({ position: [px - 1, py - 2, pz], size: [1, 1, 1], style: playerStyle });
                    heerich.addBox({ position: [px + 1, py - 2, pz], size: [1, 1, 1], style: playerStyle });

                    container.innerHTML = heerich.toSVG({ padding: 100 });
                }
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        }
        start();
    </script>
</body>
</html>
